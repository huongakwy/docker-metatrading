; ============================================================================
; MT5 Startup Configuration - EA Auto-Attachment
; ============================================================================
;
; IMPORTANT: This startup.ini uses the [StartUp] section which tells MT5 to:
; 1. Open the specified chart (Symbol=XAUUSDm, Period=M1)
; 2. Load the specified template (Template=AutoBridge)
; 3. Attach the EA (Expert=TradingBridgeeaV2)
;
; The AutoBridge.tpl template must be placed in:
; /config/.wine/drive_c/Program Files/MetaTrader 5/Profiles/Templates/
;
; ============================================================================

[Common]
AllowAlgoTrading=1
AllowDLLImports=1
AllowLiveTrading=1
Language=en
Description=Auto-start MT5 with EA attached

[StartUp]
; EA to load - this is the key for auto-attachment
Expert=TradingBridgeeaV2

; Chart settings
Symbol=XAUUSDm
Period=M1

; Template that should have EA already configured
; You need to export this from a working container with EA attached
Template=AutoBridge

[Expert Advisors]
; EA settings
LastUsedNameLocal=TradingBridgeeaV2
AllowDllImports=true
AllowLiveTrade=true

[Charts]
OpenedChartSymbol=XAUUSDm
OpenedChartPeriod=1
MaxBars=1000

[Terminal]
Left=0
Top=0
Right=1920
Bottom=1080
TradeExperts=1
ChartScale=2
ChartFixedPeriod=1
ChartShift=true

